        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get event by ID
      tags:
        - events
  /events/{id}/book:
    post:
      consumes:
        - application/json
      description: Create a new booking for a specific event
      parameters:
        - description: Event ID
          in: path
          name: id
          required: true
          type: integer
        - description: Booking data
          in: body
          name: booking
          required: true
          schema:
