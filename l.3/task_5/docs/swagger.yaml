      tags:
        - events
    post:
      consumes:
        - application/json
      description: Create a new event with specified details
      parameters:
        - description: Event data
          in: body
          name: event
          required: true
          schema:
            $ref: '#/definitions/github_com_Komilov31_event-booker_internal_dto.CreateEvent'
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Komilov31_event-booker_internal_model.Event'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an event
      tags:
        - events
  /events/{id}:
    get:
      consumes:
        - application/json
      description: Get detailed information about a specific event
      parameters:
        - description: Event ID
          in: path
          name: id
          required: true
          type: integer
      produces:
